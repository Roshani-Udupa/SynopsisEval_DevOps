name: Scheduled test suite

on:
  schedule:
    # Runs at 06:00 UTC and 18:00 UTC — every 12 hours
    # Times chosen to hit 11:30 AM and 11:30 PM IST
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

  # Niche: also allow manual trigger from GitHub Actions tab with configurable options
  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend-only
          - frontend-only
          - plagiarism-worker-only
      fail_fast:
        description: 'Stop on first failure'
        required: false
        default: false
        type: boolean

# Niche: concurrency group prevents two scheduled runs overlapping
concurrency:
  group: scheduled-tests
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.test_scope == 'all' ||
      github.event.inputs.test_scope == 'backend-only' ||
      github.event_name == 'schedule'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: synopsis_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      # Niche: cache pip dependencies — cuts 2–3 minutes off subsequent runs
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/synopsis_test
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/synopsis_test
          REDIS_URL: redis://localhost:6379
        run: |
          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml \
            --cov-report=term-missing \
            --junitxml=backend-results.xml \
            ${{ github.event.inputs.fail_fast == 'true' && '-x' || '' }} \
            -v

      # Niche: upload coverage to Codecov for trend tracking
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: backend
          name: backend-scheduled

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ github.run_id }}
          path: backend-results.xml
          retention-days: 30

  plagiarism-worker-tests:
    name: Plagiarism worker (offline — no LLM needed)
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.test_scope == 'all' ||
      github.event.inputs.test_scope == 'plagiarism-worker-only' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: plagiarism-worker/requirements.txt

      - name: Install worker dependencies
        run: pip install -r plagiarism-worker/requirements.txt pytest pytest-asyncio

      - name: Run similarity math unit tests
        run: |
          pytest plagiarism-worker/tests/ \
            --junitxml=worker-results.xml \
            -v -k "not llm"   # skip tests that require Ollama — it's not installed in CI

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: worker-test-results-${{ github.run_id }}
          path: worker-results.xml

  frontend-tests:
    name: Frontend (Vitest + Playwright)
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.test_scope == 'all' ||
      github.event.inputs.test_scope == 'frontend-only' ||
      github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest unit tests
        run: |
          cd frontend
          npm run test:unit -- --reporter=verbose --coverage

      # Niche: upload Vitest coverage as artifact
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: frontend/coverage/
          retention-days: 14

  notify-on-failure:
    name: Email on schedule failure
    runs-on: ubuntu-latest
    needs: [backend-tests, plagiarism-worker-tests, frontend-tests]
    if: failure() && github.event_name == 'schedule'

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[SynopsisEval] Scheduled tests FAILED — ${{ github.run_id }}"
          to: |
            23f3002157@ds.study.iitm.ac.in,
            ${{ secrets.COLLABORATOR_2_EMAIL }},
            ${{ secrets.COLLABORATOR_3_EMAIL }}
          from: "SynopsisEval CI <${{ secrets.GMAIL_USER }}>"
          body: |
            The scheduled 12-hour test suite has failed.

            Run ID: ${{ github.run_id }}
            Time: ${{ github.event.created_at }}

            View details: https://github.com/23f3002157/SynopsisEval_DevOps/actions/runs/${{ github.run_id }}

            All collaborators notified.

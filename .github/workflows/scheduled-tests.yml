name: Scheduled health check

on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Which checks to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend-only
          - frontend-only

concurrency:
  group: scheduled-health-check
  cancel-in-progress: true

jobs:
  backend-check:
    name: Backend (install + import check)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'backend-only'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: synopsis_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Load schema into test database
        env:
          PGPASSWORD: testpass
        run: psql -h localhost -U postgres -d synopsis_test -f database/schema.sql

      - name: Import check
        # LESS STRICT: If this fails, the job continues
        continue-on-error: true
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/synopsis_test
          SECRET_KEY: ci-health-check-secret
          ENVIRONMENT: test
        run: python -c "from app.main import app; print('app import OK')"
        working-directory: backend

  frontend-check:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'frontend-only'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        # LESS STRICT: Don't let TypeScript errors block the build
        continue-on-error: true
        run: cd frontend && npx tsc --noEmit

      - name: Production build
        # If your build script (like Vite) runs tsc internally, 
        # this might still fail unless you fix the code or the script.
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_id }}
          path: frontend/dist/
          retention-days: 7

  notify-on-failure:
    name: Email on scheduled failure
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    # Note: continue-on-error marks a step as "success" for the job status.
    # This job will now only trigger if a hard error (like a failed npm install) occurs.
    if: >
      always() &&
      github.event_name == 'schedule' &&
      (needs.backend-check.result == 'failure' || needs.frontend-check.result == 'failure')

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[SynopsisEval] Scheduled health check FAILED — ${{ github.run_id }}"
          to: |
            23f3002157@ds.study.iitm.ac.in,
            ${{ secrets.COLLABORATOR_2_EMAIL }},
            ${{ secrets.COLLABORATOR_3_EMAIL }}
          from: "SynopsisEval CI <${{ secrets.GMAIL_USER }}>"
          body: |
            The scheduled 12-hour health check has failed on a critical step.

            Run ID  : ${{ github.run_id }}
            View details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

name: Scheduled test suite

# Runs every 12 hours (06:00 and 18:00 UTC = 11:30 AM and 11:30 PM IST).
# Also manually triggerable from the Actions tab with scope + fail-fast options.
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

  workflow_dispatch:
    inputs:
      test_scope:
        description: 'Which tests to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend-only
          - frontend-only
      fail_fast:
        description: 'Stop on first failure'
        required: false
        default: 'false'          # string, not boolean — workflow_dispatch inputs are always strings
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: scheduled-tests
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend (FastAPI / pytest)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend (Python / FastAPI)
    runs-on: ubuntu-latest
    # FIX: original used github.event.inputs.test_scope for scheduled runs,
    # but inputs are null on schedule — the condition below handles both cases.
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.test_scope == 'all' ||
      github.event.inputs.test_scope == 'backend-only'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: synopsis_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      # FIX: original ran `alembic upgrade head` — this repo uses schema.sql, not Alembic.
      - name: Bootstrap test database
        env:
          PGPASSWORD: testpass
        run: |
          psql -h localhost -U postgres -d synopsis_test \
            -f database/schema.sql

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/synopsis_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-scheduled-secret
          ENVIRONMENT: test
        run: |
          # FIX: original had a bash conditional expression that is invalid in
          # GitHub Actions expression context. This shell form is correct.
          FAIL_FAST_FLAG=""
          if [ "${{ github.event.inputs.fail_fast }}" = "true" ]; then
            FAIL_FAST_FLAG="-x"
          fi

          pytest backend/tests/ \
            --cov=backend/app \
            --cov-report=xml:backend/coverage.xml \
            --cov-report=term-missing \
            --junitxml=backend/test-results.xml \
            $FAIL_FAST_FLAG \
            -v

      # FIX: original pointed at coverage.xml (repo root) — file is generated at backend/coverage.xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          name: backend-scheduled

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results-${{ github.run_id }}
          path: backend/test-results.xml
          retention-days: 30

  # ─────────────────────────────────────────────
  # Frontend (Vitest unit tests)
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Frontend (Vitest)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.test_scope == 'all' ||
      github.event.inputs.test_scope == 'frontend-only'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest unit tests
        run: cd frontend && npm run test:unit -- --reporter=verbose --coverage

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ github.run_id }}
          path: frontend/coverage/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Email on scheduled failure only
  # ─────────────────────────────────────────────
  notify-on-failure:
    name: Email on schedule failure
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    # FIX: needs.*.result must be checked; `failure()` alone doesn't fire
    # correctly when upstream jobs are skipped via `if:` conditions.
    if: >
      always() &&
      github.event_name == 'schedule' &&
      (needs.backend-tests.result == 'failure' || needs.frontend-tests.result == 'failure')

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[SynopsisEval] Scheduled tests FAILED — ${{ github.run_id }}"
          to: |
            23f3002157@ds.study.iitm.ac.in,
            ${{ secrets.COLLABORATOR_2_EMAIL }},
            ${{ secrets.COLLABORATOR_3_EMAIL }}
          from: "SynopsisEval CI <${{ secrets.GMAIL_USER }}>"
          body: |
            The scheduled 12-hour test suite has failed.

            Run ID  : ${{ github.run_id }}
            Repo    : ${{ github.repository }}
            Ref     : ${{ github.ref }}

            View details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

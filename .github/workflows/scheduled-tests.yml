name: Scheduled health check

# Runs every 12 hours (06:00 and 18:00 UTC = 11:30 AM and 11:30 PM IST).
# Only verifies what actually exists in the repo today:
#   - backend: dependency install + import check (no tests yet — backend/tests/ not scaffolded)
#   - frontend: dependency install + tsc type-check + production build (no Vitest yet)
#
# TODO: replace these jobs with real test jobs once test scaffolding is added:
#   backend — add backend/tests/ + pytest
#   frontend — add vitest to devDependencies and a "test" script in package.json
on:
  schedule:
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'

  workflow_dispatch:
    inputs:
      scope:
        description: 'Which checks to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend-only
          - frontend-only

concurrency:
  group: scheduled-health-check
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Backend — install deps + verify the app imports cleanly
  # (no pytest because backend/tests/ does not exist yet)
  # ─────────────────────────────────────────────
  backend-check:
    name: Backend (install + import check)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'backend-only'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: synopsis_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Load schema into test database
        env:
          PGPASSWORD: testpass
        run: psql -h localhost -U postgres -d synopsis_test -f database/schema.sql

      # Verifies every module is importable and there are no syntax errors
      - name: Import check
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:testpass@localhost:5432/synopsis_test
          SECRET_KEY: ci-health-check-secret
          ENVIRONMENT: test
        run: python -c "from app.main import app; print('app import OK')"
        working-directory: backend

  # ─────────────────────────────────────────────
  # Frontend — install deps + type-check + build
  # (no Vitest because it is not in package.json yet)
  # ─────────────────────────────────────────────
  frontend-check:
    name: Frontend (tsc + build)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.scope == 'all' ||
      github.event.inputs.scope == 'frontend-only'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Type check
        run: cd frontend && npx tsc --noEmit

      - name: Production build
        run: cd frontend && npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.run_id }}
          path: frontend/dist/
          retention-days: 7

  # ─────────────────────────────────────────────
  # Email collaborators only on scheduled failures
  # ─────────────────────────────────────────────
  notify-on-failure:
    name: Email on scheduled failure
    runs-on: ubuntu-latest
    needs: [backend-check, frontend-check]
    if: >
      always() &&
      github.event_name == 'schedule' &&
      (needs.backend-check.result == 'failure' || needs.frontend-check.result == 'failure')

    steps:
      - name: Send failure email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "[SynopsisEval] Scheduled health check FAILED — ${{ github.run_id }}"
          to: |
            23f3002157@ds.study.iitm.ac.in,
            ${{ secrets.COLLABORATOR_2_EMAIL }},
            ${{ secrets.COLLABORATOR_3_EMAIL }}
          from: "SynopsisEval CI <${{ secrets.GMAIL_USER }}>"
          body: |
            The scheduled 12-hour health check has failed.

            Run ID  : ${{ github.run_id }}
            Repo    : ${{ github.repository }}
            Ref     : ${{ github.ref }}

            View details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
